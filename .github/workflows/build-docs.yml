name: Build Docs

on:
  push:
    branches: main
  pull_request:

jobs:
  build:
    name: Build Sphinx documentation
    runs-on: ubuntu-latest

    env:
      # Adjust if your docs are in a different directory
      DOCS_DIR: docs

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # If you have extras for docs, prefer this:
          # pip install ".[docs]"
          pip install sphinx sphinx-autoapi

      - name: Install package in editable mode
        run: |
          # So autodoc can import your package
          pip install -e .

      - name: Build Sphinx documentation (fail on warnings)
        run: |
          make -C docs clean html SPHINXOPTS="-W --keep-going -T"
          # Flags:
          # -W           = turn warnings into errors (fail the job)
          # --keep-going = try to continue after errors, but still fail in the end
          # -T           = show full traceback for easier debugging
