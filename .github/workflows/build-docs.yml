name: Build Docs

on:
  - push
  - pull_request

jobs:
  build:
    name: Build Sphinx documentation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f docs/requirements.txt ]; then pip install -r docs/requirements.txt; fi
          # fallback if you don't have a requirements file:
          pip install sphinx sphinx-rtd-theme sphinxcontrib-napoleon

      - name: Install package in editable mode
        run: |
          # So autodoc can import your package
          pip install -e .

      - name: Generate API stubs with sphinx-apidoc
        working-directory: docs
        run: |
          sphinx-apidoc -o . ../baccmod --force --implicit-namespaces

      - name: Build HTML docs
        working-directory: docs
        run: |
          sphinx-build -b html . _build/html

      - name: Upload built docs as artifact
        uses: actions/upload-artifact@v4
        with:
          name: sphinx-docs
          path: docs/_build/html
